<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ContentFlow</title>
  <!-- GitHub Pages SPA redirect: sends 404s back to index.html -->
  <script>
    // Store the path so index.html can pick it up
    const path = window.location.pathname + window.location.search;
    sessionStorage.setItem('redirect', path);
    window.location.replace('/contentflow/index.html');
  </script>
</head>
<body></body>
</html>
